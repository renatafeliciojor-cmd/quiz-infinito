<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Infinito</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header com Pontuação -->
        <div class="header">
            <h1>🧠 Quiz Infinito</h1>
            <div class="score-box">
                <div class="stat">
                    <span class="label">Pontos</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="label">🔥 Streak</span>
                    <span class="value" id="streak">0</span>
                </div>
                <div class="stat">
                    <span class="label">❓ Pergunta</span>
                    <span class="value" id="question-count">1</span>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <div id="quiz-container" class="quiz-container">
                <!-- Pergunta -->
                <div class="question-section">
                    <h2 id="question" class="question">Carregando pergunta...</h2>
                    <div class="difficulty" id="difficulty">Fácil</div>
                </div>

                <!-- Opções -->
                <div class="options">
                    <button class="option-btn" onclick="selectAnswer(0)">
                        <span class="option-letter">A</span>
                        <span class="option-text" id="option-0">Opção 1</span>
                    </button>
                    <button class="option-btn" onclick="selectAnswer(1)">
                        <span class="option-letter">B</span>
                        <span class="option-text" id="option-1">Opção 2</span>
                    </button>
                    <button class="option-btn" onclick="selectAnswer(2)">
                        <span class="option-letter">C</span>
                        <span class="option-text" id="option-2">Opção 3</span>
                    </button>
                    <button class="option-btn" onclick="selectAnswer(3)">
                        <span class="option-letter">D</span>
                        <span class="option-text" id="option-3">Opção 4</span>
                    </button>
                </div>

                <!-- Resultado da Resposta -->
                <div id="result-message" class="result-message" style="display: none;"></div>

                <!-- Botão Próxima -->
                <button id="next-btn" class="next-btn" onclick="nextQuestion()" style="display: none;">
                    Próxima Pergunta →
                </button>
            </div>

            <!-- Leaderboard -->
            <div class="leaderboard">
                <h3>🏆 Melhores Scores</h3>
                <ul id="leaderboard-list"></ul>
                <button class="reset-btn" onclick="resetLeaderboard()">Limpar Histórico</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
