<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leve Chopp · Gestão</title>
    <meta name="description" content="Sistema de gestão completo da cervejaria Leve Chopp — Belo Horizonte">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-logo">🍺</div>
                <div class="brand-text">
                    <strong>Leve Chopp</strong>
                    <span>Belo Horizonte · MG</span>
                </div>
            </div>
            <nav class="nav" id="nav">
                <a href="#/dashboard" data-route="dashboard"><span class="ico">📊</span> Dashboard</a>
                <a href="#/pdv" data-route="pdv"><span class="ico">🧾</span> Vendas / PDV</a>
                <a href="#/pedidos" data-route="pedidos"><span class="ico">📦</span> Pedidos</a>
                <a href="#/produtos" data-route="produtos"><span class="ico">🍻</span> Produtos &amp; Estoque</a>
                <a href="#/chopeiras" data-route="chopeiras"><span class="ico">❄️</span> Locação Chopeiras</a>
                <a href="#/clientes" data-route="clientes"><span class="ico">👥</span> Clientes</a>
                <a href="#/financeiro" data-route="financeiro"><span class="ico">💰</span> Financeiro</a>
                <a href="#/relatorios" data-route="relatorios"><span class="ico">📈</span> Relatórios</a>
                <a href="#/config" data-route="config"><span class="ico">⚙️</span> Configurações</a>
            </nav>
            <div class="sidebar-foot">
                <span id="clock"></span>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="topbar">
                <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
                <h1 id="pageTitle">Dashboard</h1>
                <div class="topbar-right">
                    <span class="badge" id="alertBadge" title="Alertas"></span>
                </div>
            </header>
            <section class="content" id="view"><!-- rendered by app.js --></section>
        </main>
    </div>

    <!-- Modal genérico -->
    <div class="modal-overlay" id="modal" aria-hidden="true">
        <div class="modal">
            <div class="modal-head">
                <h2 id="modalTitle">Título</h2>
                <button class="modal-close" id="modalClose" aria-label="Fechar">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" aria-live="polite"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
